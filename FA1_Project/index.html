<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wordel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <button class="btn-replay" id="replayBtn" onclick="replayGame()">&#8635; Replay</button>
    </div>
    <div class="header-center">
      <span class="header-title">Wordel</span>
    </div>
    <div class="header-right">
      <button onclick="toggleSettings()">⚙</button>
      <button class="btn-auth">Login</button>
      <button class="btn-auth">Sign Up</button>
    </div>
  </header>

  <div id="settingsPanel" class="hidden" style="position:fixed;top:61px;right:10px;font-size:0.85rem;">
    <label><input type="checkbox" onchange="toggleDark(this)" /> Dark Mode</label>
  </div>

  <!-- LANDING PAGE -->
  <div id="landingPage" class="landing">
    <h1 class="landing-title">Wordel</h1>
    <button class="btn-play" onclick="startGame()">Play</button>
  </div>

  <!-- GAME PAGE -->
  <div id="gamePage" class="game-page hidden">

    <div id="message" class="message"></div>

    <!-- 6x5 Grid -->
    <div class="grid" id="grid"></div>

    <!-- Input -->
    <div class="input-row">
      <input
        type="text"
        id="guessInput"
        class="guess-input"
        maxlength="5"
        placeholder="Enter Your Guess"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="characters"
        spellcheck="false"
      />
      <button class="btn-submit" onclick="submitGuess()">Enter</button>
    </div>

    <!-- On-screen Keyboard -->
    <div class="keyboard" id="keyboard"></div>

  </div>

  <!-- END POPUP -->
  <div id="endPopup" class="popup-overlay hidden">
    <div class="popup-box">
      <h2 id="popupTitle"></h2>
      <p id="popupLine1"></p>
      <p id="popupLine2"></p>
      <p id="popupLine3"></p>
      <div class="popup-buttons">
        <button onclick="replayGame(); closePopup()">Replay</button>
        <button>Login</button>
        <button>Sign Up</button>
      </div>
    </div>
  </div>

  <script src="Script.js"></script>
</body>
</html>
